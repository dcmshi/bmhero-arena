# Place at .github/workflows/determinism.yml in the repo.
name: determinism
on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,    cc: gcc,   opt: -O0 }
          - { os: ubuntu-latest,    cc: gcc,   opt: -O2 }
          - { os: ubuntu-latest,    cc: clang, opt: -O2 }
          - { os: ubuntu-24.04-arm, cc: gcc,   opt: -O2 }   # cross-arch gate
          - { os: macos-latest,     cc: clang, opt: -O2 }   # ARM64 + clang
          - { os: windows-latest,   cc: gcc,   opt: -O2 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: build + run tests
        shell: bash
        run: |
          ${{ matrix.cc }} -std=c11 -Wall -Wextra -Werror ${{ matrix.opt }} \
            -o test_det src/arena/arena_sim.c tests/test_determinism.c
          ./test_det
      # Cross-platform hash equality: every job must produce this exact final
      # state hash for the scripted match. Update ONLY on intentional sim change
      # (and bump TUNE_VERSION / netcode version accordingly).
      - name: pin scripted-match hash
        shell: bash
        run: |
          cat > hash_main.c <<'EOF'
          #include <stdio.h>
          #include "src/arena/arena_sim.h"
          int main(void){ ArenaState s; ArenaInput in[4];
            arena_init(&s,0,4,0xB0BB1E5);
            uint32_t r=0xC0FFEE01;
            for(uint32_t t=0;t<5400;t++){
              for(int i=0;i<4;i++){ r^=r<<13;r^=r>>17;r^=r<<5;
                int sx=(int)(r&63)-32; if(sx<-31)sx=-31;
                int sy=(int)((r>>6)&63)-32; if(sy<-31)sy=-31;
                int set=((t+i*53)%137)==0;
                int bomb=((t+i*37)%(90+i*80))<(30+i*40);
                in[i]=arena_input_pack(sx,sy,((r>>12)&31)==0,bomb,set);}
              arena_tick(&s,in);}
            printf("%08x\n",arena_hash(&s)); return 0;}
          EOF
          ${{ matrix.cc }} -std=c11 ${{ matrix.opt }} -I. -o hash_check hash_main.c src/arena/arena_sim.c
          h=$(./hash_check)
          echo "hash: $h"
          test "$h" = "4b6687d4"
