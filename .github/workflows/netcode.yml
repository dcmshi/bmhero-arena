name: netcode
on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: configure + build
        shell: bash
        run: |
          cmake -S . -B build
          cmake --build build --config Release --parallel
      - name: ctest
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure
